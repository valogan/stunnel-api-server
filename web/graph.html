<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cresco Tunnel Graph</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        #mynetwork {
            width: 100%;
            height: 600px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--bg-main);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Cresco Tunnel Graph</h1>
            <p>Visual representation of your stunnel pipelines</p>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="graph.html" class="nav-link active">Graph View</a>
            </nav>
        </header>

        <main>
            <section class="card tunnel-list">
                <div class="section-header">
                    <h2>Tunnel Network Visualization</h2>
                    <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
                </div>
                <div id="mynetwork"></div>
            </section>
        </main>
    </div>

    <!-- API Config Modal -->
    <div id="configModal" class="modal hidden">
        <div class="modal-content">
            <h2>API Configuration</h2>
            <p>Verify or update the API endpoint URL</p>
            <div class="form-group">
                <label for="apiUrl">API URL</label>
                <input type="url" id="apiUrl" value="http://localhost:8005">
            </div>
            <button id="saveConfigBtn" class="btn btn-primary">Save & Reload</button>
        </div>
    </div>
    <div id="configToggle" class="config-toggle" title="Settings">⚙️</div>

    <script src="graph.js"></script>
</body>

</html>
