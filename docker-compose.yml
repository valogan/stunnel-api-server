version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cresco_postgres
    restart: always
    networks:
      - app_network
    environment:
      POSTGRES_USER: cresco_user
      POSTGRES_PASSWORD: cresco_password
      POSTGRES_DB: cresco_tunnels
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: cresco_api
    restart: always
    networks:
      - app_network
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://cresco_user:cresco_password@cresco_postgres:5432/cresco_tunnels
    depends_on:
      - db
    volumes:
      - ./config.ini:/app/config.ini

  web:
    image: nginx:alpine
    container_name: cresco_web
    restart: always
    networks:
      - app_network
    ports:
      - "8081:80"
    depends_on:
      - api
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
